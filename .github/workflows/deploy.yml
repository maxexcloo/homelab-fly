name: Deploy

on:
  push:
    paths:
      - .github/deploy-request.json
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy or leave empty for all"

concurrency:
  cancel-in-progress: false
  group: deploy

jobs:
  deployments:
    name: Select Deployments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.deployments.outputs.deployments }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Select Deployments
        id: deployments
        env:
          BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ inputs.service }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_SERVICE" ]; then
            if ! printf '%s' "$INPUT_SERVICE" | grep -Eq '^[a-z0-9][a-z0-9-]*$'; then
              echo "Invalid service: $INPUT_SERVICE" >&2
              exit 1
            fi
            TARGETS=$(printf '%s\n' "$INPUT_SERVICE")
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGETS=$(find . -maxdepth 1 -mindepth 1 -type d ! -name '.*' -printf '%f\n')
          else
            git show "$BEFORE:.github/deploy-request.json" > before.json 2>/dev/null || printf '{"deployments":{}}' > before.json
            TARGETS=$(jq -r --slurpfile before before.json '
              ($before[0].deployments // {}) as $old
              | (.deployments // {})
              | to_entries[]
              | select($old[.key] != .value)
              | .key
            ' .github/deploy-request.json)
          fi

          printf '%s\n' "$TARGETS" | jq -Rsc '[split("\n")[] | select(test("^[^./][^/]*$"))]' | sed 's/^/deployments=/' >> "$GITHUB_OUTPUT"

  deploy:
    if: needs.deployments.outputs.matrix != '[]'
    name: Deploy
    needs: [deployments]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service: ${{ fromJSON(needs.deployments.outputs.matrix) }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      SERVICE: ${{ matrix.service }}
      SOPS_AGE_KEY: ${{ secrets.AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Setup sops
        uses: nhedger/setup-sops@v2
      - name: Decrypt Files
        run: |
          find . -type f -print0 | while IFS= read -r -d '' f; do
            if grep -qE 'BEGIN AGE ENCRYPTED FILE|ENC\[AES256_GCM' "$f"; then
              sops --decrypt --output-type binary "$f" > "$f.tmp"
              mv "$f.tmp" "$f"
            fi
          done
      - name: Create Service
        run: flyctl apps info "$SERVICE" > /dev/null 2>&1 || flyctl apps create "$SERVICE"
      - name: Add Certificates
        run: |
          if [ -f .certs ]; then
            xargs -a .certs -I{} flyctl certs add {} --app "$SERVICE"
          fi
      - name: Import Secrets
        run: |
          if [ -f .env ]; then
            grep -v '^sops_' .env | flyctl secrets import --app "$SERVICE"
          fi
      - name: Deploy
        run: flyctl deploy --app "$SERVICE" --config fly.toml > /dev/null
      - name: Scale Machines
        run: |
          if [ -f .machine-count ]; then
            flyctl scale count "$(tr -d '[:space:]' < .machine-count)" --app "$SERVICE"
          fi
