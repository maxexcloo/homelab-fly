name: Deploy

on:
  push:
    paths:
      - .github/deploy-request.json
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy or leave empty for all"

concurrency:
  cancel-in-progress: false
  group: deploy

permissions:
  contents: read

jobs:
  deployments:
    name: Select Deployments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.deployments.outputs.deployments }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Select Deployments
        id: deployments
        env:
          BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ inputs.service }}
        run: python3 .github/scripts/select-deployments.py

  deploy:
    if: needs.deployments.outputs.matrix != '[]'
    name: ${{ matrix.deployment.action }} ${{ matrix.deployment.service }}
    needs: [deployments]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        deployment: ${{ fromJSON(needs.deployments.outputs.matrix) }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      SERVICE: ${{ matrix.deployment.service }}
      SOPS_AGE_KEY: ${{ secrets.AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Setup sops
        if: matrix.deployment.action == 'deploy'
        uses: nhedger/setup-sops@v2
      - name: Decrypt Files
        if: matrix.deployment.action == 'deploy'
        env:
          DECRYPT_ROOT: ${{ matrix.deployment.service }}
        run: python3 .github/scripts/decrypt.py
      - name: Deploy
        if: matrix.deployment.action == 'deploy'
        run: python3 .github/scripts/deploy.py
      - name: Delete
        if: matrix.deployment.action == 'delete'
        run: python3 .github/scripts/delete.py
